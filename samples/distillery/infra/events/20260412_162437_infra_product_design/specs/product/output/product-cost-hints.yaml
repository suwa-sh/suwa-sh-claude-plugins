    trigger: "メモリ使用率 > 80%"

  - component: "Lambda Backend API"
    current: "512 MB"
    recommendation: "初期は 512 MB で開始。Duration の p99 が 5 秒を超えたら 1024 MB に増量"
    trigger: "Duration p99 > 5000ms"

  - component: "Lambda Worker Batch"
    current: "1024 MB"
    recommendation: "バッチ処理時間が 10 分を超えたら 2048 MB に増量"
    trigger: "Duration > 600000ms"

