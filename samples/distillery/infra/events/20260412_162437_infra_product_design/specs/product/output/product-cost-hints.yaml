optimization_strategies:
  - id: "opt_001"
    name: "NAT Gateway コスト削減"
    category: "networking"
    description: "NAT Gateway は固定費が高い（~$32/月）。VPC エンドポイントを活用し、NAT Gateway 経由のトラフィックを最小化する"
    potential_saving: "$20-25/月"
    risk: "low"
    implementation: |
      - S3 Gateway エンドポイント（無料）で S3 アクセスを NAT 経由から切り替え
      - SQS, Secrets Manager, CloudWatch Logs の Interface エンドポイント追加
      - 将来的に NAT Gateway 不要になれば撤去（月 $32 削減）
    priority: "high"

  - id: "opt_002"
    name: "RDS Single-AZ 検討"
    category: "database"
    description: "RTO 1 営業日、RPO 日次バックアップの要件であれば Single-AZ でも要件を満たす。Multi-AZ は NFR A.2.5.1 Lv3 対応だが、RDS の自動バックアップで日次 RPO は確保済み"
    potential_saving: "$13/月"
    risk: "medium"
    implementation: |
      - Single-AZ に変更し、コスト半減
      - 障害時は自動バックアップからのリストアで RTO 数時間
      - ストレージ冗長化は EBS の 3 AZ レプリケーションで確保
    priority: "medium"

  - id: "opt_003"
    name: "App Runner Auto Pause"
    category: "compute"
    description: "App Runner の Auto Pause 機能を有効化し、トラフィックがない時間帯（21時〜翌9時）のコストを削減"
    potential_saving: "$2-5/月"
    risk: "low"
    implementation: |
      - Auto Pause を有効化（トラフィックなし状態が続くとインスタンス停止）
      - 初回リクエスト時にコールドスタート（数秒）が発生
      - 運用時間外（21時〜翌9時）のコスト削減に有効
    priority: "medium"

  - id: "opt_004"
    name: "Lambda Provisioned Concurrency 不使用"
    category: "compute"
    description: "レスポンスタイム要件が 10 秒以内と緩いため、Provisioned Concurrency は不要。コールドスタートを許容する"
    potential_saving: "回避コスト: $15-30/月"
    risk: "low"
    implementation: |
      - Provisioned Concurrency を設定しない（デフォルト）
      - コールドスタート時間: 1-3 秒（10 秒以内の要件を満たす）
      - 将来的にレイテンシ要件が厳しくなった場合に再検討
    priority: "low"

  - id: "opt_005"
    name: "Reserved Instance 検討（RDS）"
    category: "database"
    description: "1 年以上の利用が確定している場合、RDS Reserved Instance で約 30-40% のコスト削減が可能"
    potential_saving: "$8-10/月"
    risk: "low"
    implementation: |
      - 1 年 RI（部分前払い）: 約 30% 割引
      - 3 年 RI（全前払い）: 約 40% 割引
      - 本番運用開始後、安定稼働を確認してから購入を推奨
    priority: "low"

  - id: "opt_006"
    name: "CloudWatch ログ保持期間の最適化"
    category: "observability"
    description: "アプリケーションログの保持期間を 30 日に抑え、監査ログのみ 365 日保持する"
    potential_saving: "$1-3/月"
    risk: "low"
    implementation: |
      - /library-management/frontend: 30 日
      - /library-management/backend-api: 30 日
      - /library-management/worker: 30 日
      - /library-management/audit: 365 日
    priority: "low"

