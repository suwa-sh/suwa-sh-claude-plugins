uc: "書籍を登録する"
business: "蔵書管理業務"
buc: "蔵書管理フロー"
endpoints:
  - method: "POST"
    path: "/api/v1/books"
    summary: "書籍の新規登録"
    request_schema: "CreateBookRequest"
    response_schema: "BookResponse"
    tags:
      - "蔵書管理"
async_events: []
schemas:
  - name: "CreateBookRequest"
    properties:
      - name: "title"
        type: "string"
        required: true
        description: "書籍タイトル"
      - name: "author"
        type: "string"
        required: true
        description: "著者名"
      - name: "isbn"
        type: "string"
        required: true
        description: "ISBN-13形式"
      - name: "publisher"
        type: "string"
        required: true
        description: "出版社名"
      - name: "genre"
        type: "string"
        required: true
        description: "書籍ジャンル"
      - name: "material_type"
        type: "string"
        required: true
        description: "資料種別"
      - name: "location"
        type: "string"
        required: false
        description: "配架場所"
  - name: "BookResponse"
    properties:
      - name: "id"
        type: "string"
        required: true
        description: "書籍ID"
      - name: "title"
        type: "string"
        required: true
        description: "タイトル"
      - name: "author"
        type: "string"
        required: true
        description: "著者"
      - name: "isbn"
        type: "string"
        required: true
        description: "ISBN"
      - name: "publisher"
        type: "string"
        required: true
        description: "出版社"
      - name: "genre"
        type: "string"
        required: true
        description: "ジャンル"
      - name: "material_type"
        type: "string"
        required: true
        description: "資料種別"
      - name: "location"
        type: "string"
        required: false
        description: "配架場所"
      - name: "status"
        type: "string"
        required: true
        description: "貸出状態"
      - name: "created_at"
        type: "string"
        required: true
        description: "登録日時"
