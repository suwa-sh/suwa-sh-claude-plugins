            value: "リクエストのauthor"
          - name: "isbn"
            value: "リクエストのisbn"
          - name: "publisher"
            value: "リクエストのpublisher"
          - name: "genre"
            value: "リクエストのgenre"
          - name: "material_type"
            value: "リクエストのmaterial_type"
          - name: "location"
            value: "リクエストのlocation"
          - name: "updated_at"
            value: "現在日時"
        where: "id = :id"
    indexes_needed: []

