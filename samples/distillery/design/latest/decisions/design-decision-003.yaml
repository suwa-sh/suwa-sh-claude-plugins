schema_version: "1.0"
artifact_type: "decision_record"
skill_type: "design_system"
artifact_id: "design-decision-003"
title: "トークンアーキテクチャ: 3層構造の採用"
status: "approved"
generated_at: "2026-04-12T16:46:50"
context: |
  デザインシステムのスケーラビリティとメンテナンス性を確保するため、
  トークンの構造化が必要。ポータル別テーマ切替と dark mode 対応の要件あり。
decision: |
  Primitive → Semantic → Component の3層トークン構造を採用。
  Primitive: カラースケール（gray, blue, slate, green, red, orange, amber, violet）、
  スペーシング（4px基準）、タイポグラフィ、角丸、シャドウ。
  Semantic: 背景/前景/ボーダー、ステータス色（success/warning/destructive/info）、
  ポータル別プライマリ。dark modeオーバーライドはrgba()半透明値を使用。
  Component: ボタン/入力/カード/バッジ/テーブル/サイドバーのトークン。
consequences:
  positive:
    - "テーマ切替（ポータル/dark mode）が CSS 変数の切替のみで実現可能"
    - "新しいコンポーネント追加時もSemantic層を参照すれば一貫性を維持"
    - "デザイントークンの変更が自動的に全コンポーネントに波及"
  negative:
    - "初期構築コストがやや高い"
    - "3層の参照関係を理解する学習コスト"
alternatives_considered:
  - name: "フラットなCSS変数"
    reason_rejected: "テーマ切替とdark mode対応で変数の重複が爆発する"
  - name: "Tailwind設定のみ（トークンなし）"
    reason_rejected: "ポータル別テーマ切替が困難で、コンポーネント間の一貫性が保てない"
