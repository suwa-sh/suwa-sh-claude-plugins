    mono: "'JetBrains Mono', 'Fira Code', monospace"
    scale:
      xs: "0.75rem"
      sm: "0.875rem"
      base: "1rem"
      lg: "1.125rem"
      xl: "1.25rem"
      "2xl": "1.5rem"
      "3xl": "1.875rem"
  voice:
    tone: "信頼・堅実"
    principles:
