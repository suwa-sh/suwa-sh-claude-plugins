components:
  ui:
    - name: "Button"
      variants:
        - "default"
        - "secondary"
        - "outline"
        - "ghost"
        - "destructive"
      sizes:
        - "sm"
        - "md"
        - "lg"
    - name: "Badge"
      variants:
        - "default"
        - "success"
        - "warning"
        - "destructive"
        - "info"
        - "outline"
    - name: "Card"
      variants:
        - "default"
        - "hoverable"
    - name: "Input"
      variants:
        - "default"
        - "error"
    - name: "Icon"
      variants: []
  domain:
    - name: "BookCard"
      description: "書籍情報をカード形式で表示するコンポーネント。蔵書検索結果の一覧表示に使用"
      screens:
        - "蔵書検索画面"
        - "蔵書管理画面"
      props:
        - "title: string"
        - "author: string"
        - "isbn: string"
        - "publisher: string"
        - "genre: string"
        - "materialType: string"
        - "location: string"
        - "status: BookLoanStatus"
      variants:
        - "compact"
        - "detailed"
    - name: "BookLoanStatusBadge"
      description: "書籍貸出状態を表すステータスバッジ。在庫あり/貸出中/延滞中の3状態"
      screens:
        - "蔵書検索画面"
        - "蔵書管理画面"
        - "貸出状況一覧画面"
      props:
        - "status: 'available' | 'on_loan' | 'overdue'"
      variants:
        - "available"
        - "on_loan"
        - "overdue"
    - name: "ReservationStatusBadge"
      description: "予約状態を表すステータスバッジ。予約受付中/予約確保済/予約キャンセルの3状態"
      screens:
        - "予約管理画面"
        - "予約状況画面"
      props:
        - "status: 'pending' | 'reserved' | 'cancelled'"
      variants:
        - "pending"
        - "reserved"
        - "cancelled"
    - name: "LoanRecord"
      description: "貸出記録を一行表示するコンポーネント。貸出状況一覧や貸出履歴で使用"
      screens:
        - "貸出状況一覧画面"
        - "貸出履歴画面"
        - "延滞管理画面"
      props:
        - "bookTitle: string"
        - "borrowerName: string"
        - "loanDate: string"
        - "dueDate: string"
        - "returnDate: string | null"
        - "isOverdue: boolean"
      variants:
        - "default"
        - "overdue"
    - name: "BookSearchFilter"
      description: "蔵書検索のフィルターコンポーネント。キーワード検索+ジャンル/資料種別フィルター"
      screens:
        - "蔵書検索画面"
      props:
        - "onSearch: (query: SearchQuery) => void"
        - "genres: string[]"
        - "materialTypes: string[]"
      variants: []
    - name: "StatsSummaryCard"
      description: "統計情報をサマリー表示するカードコンポーネント"
      screens:
        - "統計レポート画面"
        - "在庫状況画面"
      props:
        - "title: string"
        - "value: string | number"
        - "change: number"
        - "icon: string"
      variants:
        - "default"
        - "highlight"

screens:
  - name: "蔵書検索画面"
    portal: "user"
    route: "/books/search"
    components:
      - "BookSearchFilter"
      - "BookCard"
      - "BookLoanStatusBadge"
  - name: "貸出手続き画面"
    portal: "user"
    route: "/loans/new"
    components:
      - "BookCard"
      - "BookLoanStatusBadge"
      - "Button"
  - name: "返却手続き画面"
    portal: "user"
    route: "/loans/return"
    components:
      - "LoanRecord"
      - "Button"
  - name: "予約申請画面"
    portal: "user"
    route: "/reservations/new"
    components:
      - "BookCard"
      - "ReservationStatusBadge"
      - "Button"
  - name: "予約管理画面"
    portal: "user"
    route: "/reservations"
    components:
      - "ReservationStatusBadge"
      - "BookCard"
      - "Button"
  - name: "貸出履歴画面"
    portal: "user"
    route: "/mypage/loans"
    components:
      - "LoanRecord"
      - "BookLoanStatusBadge"
  - name: "予約状況画面"
    portal: "user"
    route: "/mypage/reservations"
    components:
      - "ReservationStatusBadge"
      - "BookCard"
  - name: "蔵書登録画面"
    portal: "admin"
    route: "/admin/books/new"
    components:
      - "Input"
      - "Button"
  - name: "蔵書編集画面"
    portal: "admin"
    route: "/admin/books/:id/edit"
    components:
      - "Input"
      - "Button"
  - name: "蔵書管理画面"
    portal: "admin"
    route: "/admin/books"
    components:
      - "BookCard"
      - "BookLoanStatusBadge"
      - "BookSearchFilter"
      - "Button"
  - name: "貸出状況一覧画面"
    portal: "admin"
    route: "/admin/loans"
    components:
      - "LoanRecord"
      - "BookLoanStatusBadge"
  - name: "延滞管理画面"
    portal: "admin"
    route: "/admin/loans/overdue"
    components:
      - "LoanRecord"
      - "BookLoanStatusBadge"
      - "Button"
  - name: "利用者登録画面"
    portal: "admin"
    route: "/admin/users/new"
    components:
      - "Input"
      - "Button"
  - name: "利用者編集画面"
    portal: "admin"
    route: "/admin/users/:id/edit"
    components:
      - "Input"
      - "Button"
  - name: "在庫状況画面"
    portal: "admin"
    route: "/admin/inventory"
    components:
      - "StatsSummaryCard"
      - "BookCard"
      - "BookLoanStatusBadge"
  - name: "統計レポート画面"
    portal: "admin"
    route: "/admin/stats"
    components:
      - "StatsSummaryCard"

states:
  - model: "書籍貸出状態"
    entries:
      - state: "在庫あり"
        label: "在庫あり"
        color: "green"
        actions:
          user: "貸出申請"
          admin: "編集, 削除"
      - state: "貸出中"
        label: "貸出中"
        color: "blue"
        actions:
          user: "予約申請, 返却申請"
          admin: "確認"
      - state: "延滞中"
        label: "延滞中"
        color: "red"
        actions:
          user: "返却申請"
          admin: "督促通知送信"
  - model: "予約状態"
    entries:
      - state: "予約受付中"
        label: "予約受付中"
        color: "blue"
        actions:
          user: "キャンセル"
          admin: "確認"
      - state: "予約確保済"
        label: "予約確保済"
        color: "green"
        actions:
          user: "貸出手続き"
          admin: "確認"
      - state: "予約キャンセル"
        label: "キャンセル済"
        color: "gray"

nfr_decisions:
  - nfr: "A.1.1.1 運用時間 Lv2"
    decision: "全画面にローディング状態とエラー状態を配置。サービス停止時間帯の告知バナーコンポーネントを用意"
  - nfr: "B.1.1.1 同時アクセス Lv1 (~100)"
    decision: "蔵書検索結果はページネーション（20件/ページ）。仮想スクロールは不要"
  - nfr: "B.2.1.1 レスポンスタイム Lv2 (10秒以内)"
    decision: "一覧画面に Skeleton UI を配置しパーシーブドパフォーマンスを改善"
  - nfr: "E.5.1.1 認証方式 Lv2 (OAuth2/OIDC)"
    decision: "ログインは IdP Hosted UI に委譲。カスタムログイン画面は作成しない"
  - nfr: "E.5.2.1 認可方式 Lv2 (RBAC)"
    decision: "data-portal 属性によるポータル別ナビゲーション切替。利用者/司書で表示画面を分離"
  - nfr: "E.1.2.1 PII保護"
    decision: "利用者情報（連絡先、メールアドレス）のマスク表示機能。司書ポータルでのみ閲覧可能"

