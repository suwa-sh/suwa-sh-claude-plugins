      confidence: "default"
    - id: "CTP-030"
      name: "WAF 方針"
      description: "WAF は導入しない。OWASP Top 10 対応（CTR-005）でアプリケーションレベルの防御を行う"
      reason: "NFR E.10.1.1 WAF Lv0（WAF なし）への対応"
      source_model: "NFR E.10.1.1"
      confidence: "default"
    - id: "CTP-031"
      name: "インシデント対応方針"
