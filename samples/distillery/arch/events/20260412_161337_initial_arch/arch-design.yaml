      reason: "NFR A.3.1.1 災害対策 Lv0（対策なし）、A.3.1.2 業務継続 Lv0（不要）への対応"
      source_model: "NFR A.3.1.1, NFR A.3.1.2"
      confidence: "user"
  cross_tier_rules:
    - id: "CTR-001"
      name: "TLS 必須"
      description: "全ティア間の通信および外部通信は TLS で暗号化する"
      reason: "NFR E.6.1.2 データ暗号化（通信時）Lv1（外部通信のみ暗号化）への対応"
      source_model: "NFR E.6.1.2"
      confidence: "high"
    - id: "CTR-002"
      name: "API バージョニング"
      description: "REST API は URL パスベースのバージョニング（/api/v1/）を採用する"
      reason: "一般的なベストプラクティスとして適用"
      source_model: "なし"
      confidence: "default"
    - id: "CTR-003"
      name: "エラー通知"
      description: "サーバエラー（5xx）発生時にメール通知を送信する"
      reason: "NFR C.3.2.1 障害通知方式 Lv1（メール通知）への対応"
      source_model: "NFR C.3.2.1"
      confidence: "default"
    - id: "CTR-004"
      name: "トークンライフサイクル管理"
      description: "アクセストークンの有効期限を短く設定し（15 分程度）、リフレッシュトークンで自動更新する。リフレッシュトークンはローテーション方式で管理する"
      reason: "マネージド IdP 導入に伴い、セッションハイジャック防止のためトークン管理方針が必要"
      source_model: "NFR E.5.1.1"
      confidence: "medium"
    - id: "CTR-005"
      name: "OWASP Top 10 対応"
      description: "OWASP Top 10 に基づく Web アプリケーションセキュリティ対策を実施する"
      reason: "NFR E.10.2.1 Web アプリケーション対策 Lv1（OWASP Top 10 対応）への対応"
      source_model: "NFR E.10.2.1"
      confidence: "medium"
  diagram_mermaid: |
    graph TD
      FE[Frontend<br/>SSR] -->|REST API| API[Backend API<br/>FaaS]
      API --> DS[(Datastore<br/>RDB + KVS)]
      API -->|MQ| WK[Worker<br/>CronJob + MQ]
      WK --> DS
      WK -->|メール送信| EXT[External<br/>メール送信サービス]
      API --> EXT
      IdP[IdP<br/>マネージド IdP] -.->|トークン検証| API
      FE -->|認証| IdP

app_architecture:
  tier_layers:
    - tier_id: "tier-frontend"
      layers:
        - id: "L-frontend-view"
          name: "ビュー層"
          responsibility: "ページコンポーネント、UI コンポーネント、レイアウト、ルーティング"
          allowed_dependencies:
            - "L-frontend-api-client"
          policies: []
          rules: []
        - id: "L-frontend-api-client"
          name: "API クライアント層"
          responsibility: "Backend API との HTTP 通信、リクエスト/レスポンスの型定義、エラーハンドリング"
          allowed_dependencies: []
          policies: []
          rules: []
      cross_layer_policies:
        - id: "CLP-001"
          name: "コンポーネント設計"
          description: "ページコンポーネントと UI コンポーネントを分離し、UI コンポーネントは再利用可能な設計とする"
          reason: "一般的なベストプラクティスとして適用"
          source_model: "なし"
          confidence: "default"
      cross_layer_rules:
        - id: "CLR-001"
          name: "冪等キー生成"
          description: "状態変更を伴う API リクエスト（POST/PUT/DELETE）ごとに冪等キー（UUID）を生成し X-Idempotency-Key ヘッダに付与する。ダブルクリック防止の UI 制御も併用する"
          reason: "冪等性方針 CTP-005 のフロントエンド側対応"
          source_model: "CTP-005"
          confidence: "user"
      diagram_mermaid: |
        graph TD
          V[view] --> AC[api-client]
    - tier_id: "tier-backend-api"
      layers:
        - id: "L-backend-api-presentation"
          name: "プレゼンテーション層"
          responsibility: "HTTP リクエスト/レスポンスの変換、入力バリデーション、アクセスログ出力、trace_id 発行"
          allowed_dependencies:
            - "L-backend-api-usecase"
          policies:
            - id: "LP-001"
              name: "入力バリデーション"
              description: "API 境界で全入力をバリデーションする"
              reason: "外部入力の安全性確保。条件.tsv に貸出期限ルール・貸出可否判定ルール・延滞判定ルール・予約優先ルールがあり、入力検証が必要"
              source_model: "条件: 貸出期限ルール, 貸出可否判定ルール, 延滞判定ルール, 予約優先ルール"
              confidence: "high"
            - id: "LP-002"
              name: "アクセスログ"
              description: "HTTP リクエスト/レスポンスのメタデータを構造化ログで出力する。trace_id を発行し後続レイヤーに伝播する"
              reason: "NFR C.1.3.1 監視範囲 Lv1 および外部アクターあり"
              source_model: "NFR C.1.3.1, アクター: 利用者"
              confidence: "medium"
          rules: []
        - id: "L-backend-api-usecase"
          name: "ユースケース層"
          responsibility: "ビジネスフロー制御、トランザクション境界管理、監査ログ記録"
          allowed_dependencies:
            - "L-backend-api-domain"
            - "L-backend-api-repository"
          policies:
            - id: "LP-003"
              name: "トランザクション管理"
              description: "貸出・予約の状態遷移を伴うビジネスフローはトランザクション境界をユースケース層で管理する"
              reason: "情報.tsv に貸出・予約等の状態遷移を伴うエンティティがあり、トランザクション整合性が必要"
              source_model: "情報: 貸出, 予約, 状態: 書籍貸出状態, 予約状態"
              confidence: "high"
            - id: "LP-004"
              name: "監査ログ"
              description: "状態遷移を伴うビジネスイベントを構造化ログで記録する（誰が、何を、どうしたか）"
              reason: "NFR E.7.1.1 監査ログ Lv2（データアクセスログ）への対応"
              source_model: "NFR E.7.1.1, 状態: 書籍貸出状態, 予約状態"
              confidence: "high"
          rules: []
        - id: "L-backend-api-domain"
          name: "ドメイン層"
          responsibility: "ビジネスルール（貸出期限・貸出可否・延滞判定・予約優先）、エンティティ、値オブジェクト、状態遷移の整合性保証"
          allowed_dependencies: []
          policies:
            - id: "LP-005"
              name: "状態遷移"
              description: "書籍貸出状態（在庫あり/貸出中/延滞中）と予約状態（予約受付中/予約確保済/予約キャンセル）の状態遷移をドメインモデル内で整合性保証する"
              reason: "状態.tsv に 2 つの状態モデル（計 8 状態 9 遷移）があり、ドメインモデルでの状態整合性保証が必要"
              source_model: "状態: 書籍貸出状態, 予約状態"
              confidence: "high"
            - id: "LP-006"
              name: "ログ出力禁止"
              description: "domain 層は直接ログ出力を行わない。ドメインイベントの発行または例外のスローで状態変化を通知する"
              reason: "一般的なベストプラクティスとして適用。domain 層の純粋性を保つ"
              source_model: "なし"
              confidence: "high"
          rules: []
        - id: "L-backend-api-repository"
          name: "リポジトリ層"
          responsibility: "domain のデータアクセス方法。aggregate root と 1:1 で定義。gateway/adapter を利用してデータを永続化・取得する"
          allowed_dependencies:
            - "L-backend-api-domain"
            - "L-backend-api-gateway"
          policies: []
          rules:
            - id: "LR-001"
              name: "Aggregate Root 対応"
              description: "repository は domain の aggregate root と 1:1 で定義する。複数テーブルにアクセスする場合は複数の gateway/adapter を利用する"
              reason: "DDD の集約パターンに従い、データアクセスの責務を明確化"
              source_model: "なし"
              confidence: "default"
            - id: "LR-002"
              name: "Event/Snapshot 併用パターン"
              description: "event_snapshot 型エンティティ（書籍・利用者・貸出・予約）の場合、repository.save(domain) は historyAdapter.insert + snapshotAdapter.upsert を実行する"
              reason: "イミュータブルデータモデルの永続化パターンを repository で隠蔽"
              source_model: "情報: 書籍, 利用者, 貸出, 予約"
              confidence: "default"
            - id: "LR-003"
              name: "メソッド命名規約"
              description: "method 名は JPA に寄せる: save, findById, findAll, deleteById など"
              reason: "広く知られた命名規約に統一し、学習コストを低減"
              source_model: "なし"
              confidence: "default"
        - id: "L-backend-api-gateway"
          name: "ゲートウェイ層"
          responsibility: "Driven Side の入出力。adapter は RDB テーブル等の datastore model と 1:1 で定義し datastore アクセスを担う。client は datastore SDK のラッパー"
          allowed_dependencies: []
          policies:
            - id: "LP-007"
              name: "冪等性"
              description: "外部呼出し（メール送信サービス）の冪等性を保証する"
              reason: "外部システム「メール送信サービス」との連携で冪等性が必要"
              source_model: "外部システム: メール送信サービス, CTP-005"
              confidence: "high"
            - id: "LP-008"
              name: "依存関係ログ"
              description: "外部 DB/API 呼び出しの開始・終了、処理時間、成否を構造化ログで出力する"
              reason: "NFR C.1.3.1 監視範囲 Lv1 への対応。外部システムとの連携箇所の可観測性確保"
              source_model: "NFR C.1.3.1, 外部システム: メール送信サービス"
              confidence: "medium"
          rules:
            - id: "LR-004"
              name: "Adapter の責務"
              description: "adapter は RDB テーブル等の datastore model と 1:1 で定義する。adapter/client や外部ライブラリの client を利用する。method 名は datastore の操作に寄せる: insert, update, delete など。ORM 利用時は自動生成コードの配置場所となる"
              reason: "datastore モデルとの対応を明確にし、変更影響範囲を限定する"
              source_model: "なし"
              confidence: "default"
            - id: "LR-005"
              name: "Client の責務"
              description: "client は datastore を操作する SDK。外部ライブラリの使い方に共通ルールがある場合や SDK が提供されていない場合に作成する"
              reason: "SDK の利用方法を一箇所に集約し、横断的な設定変更を容易にする"
              source_model: "なし"
              confidence: "default"
      cross_layer_policies:
        - id: "CLP-002"
          name: "IF なし（直接依存）"
          description: "レイヤー間は直接依存とし、開発スピードを優先する。外部サービス API 変更や DB 製品乗り換え時に凹型（IF 導入）で依存を内側に向ける"
          reason: "新規構築のため IF による疎結合化は過剰。前提条件が崩れた場合に凹型へ移行"
          source_model: "なし"
          confidence: "user"
        - id: "CLP-003"
          name: "ログ運用方針"
          description: "非同期ログ出力を原則とする。DEBUG/TRACE は本番無効がデフォルト。ログローテーションはサイズ + 時間ベースの併用。保持期間は 1 ヶ月（NFR C.6.1.1 準拠）。ログ出力先は stdout/stderr に統一"
          reason: "NFR C.6.1.1 ログ保管期間 Lv1（1 ヶ月）への対応"
          source_model: "NFR C.6.1.1"
          confidence: "medium"
        - id: "CLP-004"
          name: "ログアンチパターン防止"
          description: "多重ログ禁止、catch 握り潰し禁止、機密情報マスキング必須、ループ内逐次ログ禁止、構造化ログ強制、TZ は UTC 統一"
          reason: "一般的なベストプラクティスとして適用"
          source_model: "なし"
          confidence: "default"
      cross_layer_rules:
        - id: "CLR-002"
          name: "エラーハンドリング伝播"
          description: "domain の例外は usecase で集約キャッチし 1 回だけログ出力。presentation で HTTP ステータスに変換。cause chain を context に保持。多重ログ防止"
          reason: "レイヤー責務の分離"
          source_model: "なし"
          confidence: "default"
      diagram_mermaid: |
        graph TD
          P[presentation] --> U[usecase]
          U --> D[domain]
          U --> R[repository]
          R --> D
          R --> G[gateway]
    - tier_id: "tier-worker"
      layers:
        - id: "L-worker-presentation"
          name: "プレゼンテーション層"
          responsibility: "CronJob トリガー / MQ メッセージの受信、trace_id 取得・発行"
          allowed_dependencies:
            - "L-worker-usecase"
          policies: []
          rules: []
        - id: "L-worker-usecase"
          name: "ユースケース層"
          responsibility: "延滞検出・督促通知送信・予約通知送信のビジネスフロー制御"
          allowed_dependencies:
            - "L-worker-domain"
            - "L-worker-repository"
          policies: []
          rules: []
        - id: "L-worker-domain"
          name: "ドメイン層"
          responsibility: "延滞判定ルール等のビジネスルール。Backend API と domain を共有"
          allowed_dependencies: []
          policies: []
          rules: []
        - id: "L-worker-repository"
          name: "リポジトリ層"
          responsibility: "延滞検出対象の貸出データ取得、延滞フラグ更新。Backend API と repository を共有"
          allowed_dependencies:
            - "L-worker-domain"
            - "L-worker-gateway"
          policies: []
          rules: []
        - id: "L-worker-gateway"
          name: "ゲートウェイ層"
          responsibility: "RDB アクセス、メール送信サービス連携。Backend API と gateway を共有"
          allowed_dependencies: []
          policies: []
          rules: []
      cross_layer_policies: []
      cross_layer_rules:
        - id: "CLR-003"
          name: "ジョブ冪等性"
          description: "CronJob はジョブ実行 ID で重複実行を検知する。MQ ワーカーは MessageId で重複メッセージを検知する"
          reason: "冪等性方針 CTP-005 のワーカー側対応"
          source_model: "CTP-005"
          confidence: "user"
      diagram_mermaid: |
        graph TD
          P[presentation] --> U[usecase]
          U --> D[domain]
          U --> R[repository]
          R --> D
          R --> G[gateway]

